<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat Proxy</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N.js"></script>
    <script src="https://www.gstatic.com/charts/loader.js"></script>
    <script src="https://agora-packages.s3.us-west-2.amazonaws.com/ext/vb-2-1-0/agora-extension-virtual-background.js"></script>
    <script src="https://agora-packages.s3.us-west-2.amazonaws.com/ext/aidenoiser/index.js"></script>
    <script src="https://agora-packages.s3.us-west-2.amazonaws.com/ext/agora-beauty/agora-extension-beauty.js"></script>
    <script src="https://agora-packages.s3.us-west-2.amazonaws.com/ext/watermark/index.js"></script>
    <script type="text/javascript" src="https://unpkg.com/default-passive-events"></script>
    <style>
        .beauty-controls {
            margin-top: 10px;
            padding: 10px;
            background-color: #ff69b4;
            border-radius: 5px;
            display: flex;
            flex-direction: row;
            flex-wrap: nowrap;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            max-width: 800px;
        }
        .beauty-controls .input-group {
            flex: 1;
            min-width: 0;
            margin: 0 5px;
        }
        .beauty-controls .input-group label {
            color: white;
            font-size: 12px;
            margin-bottom: 2px;
            display: block;
        }
        .beauty-controls input[type="range"] {
            width: 100%;
            max-width: 150px;
        }
        .beauty-controls .slider-container span {
            color: white;
            font-size: 12px;
            min-width: 30px;
            text-align: right;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <img src="https://external-preview.redd.it/psbattle-this-silly-cat-v0-wBI0MzDN_yfD5jdY7ySASwg3KecJGGLa749_jiG5dVs.jpg?width=640&crop=smart&auto=webp&s=bc20d15296fadb878300018f1ec9cf8ddc8c1899" alt="Cat Logo">
                <h1>Cat Proxy Demo</h1>
            </div>
            <!--<div class="invite-link">
                <input type="text" id="inviteLink" readonly>
                <button onclick="copyInviteLink()">Copy Link</button>
            </div>-->
        </header>

        <main>
            <div class="controls">
                <div class="input-group">
                    <label for="appId">APP ID</label>
                    <input type="text" id="appId" placeholder="Enter your APP ID">
                </div>
                <div class="input-group">
                    <label for="token">Token (optional)</label>
                    <input type="text" id="token" placeholder="Enter token">
                </div>
                <div class="input-group">
                    <label for="channelName">Channel Name</label>
                    <input type="text" id="channelName" placeholder="Enter channel name">
                </div>
                <div class="input-group">
                    <label for="userId">User ID (optional)</label>
                    <input type="text" id="userId" placeholder="Enter user ID">
                </div>
                <div class="input-group">
                    <label for="micSelect">Select Microphone</label>
                    <select id="micSelect"></select>
                </div>
                <div class="input-group">
                    <label for="cameraSelect">Select Camera</label>
                    <select id="cameraSelect"></select>
                </div>
                <div class="input-group">
                    <label for="videoProfile">Video Profile</label>
                    <select id="videoProfile">
                    </select>
                </div>
                <div class="input-group">
                    <label for="audioProfile">Audio Profile</label>
                    <select id="audioProfile">
                    </select>
                </div>
                <div class="input-group">
                    <label for="cloudProxy">Cloud Proxy</label>
                    <select id="cloudProxy">
                        <option value="disabled">Disabled</option>
                        <option value="enabled">Enabled</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="geoFence">Geo-Fence</label>
                    <select id="geoFence">
                        <option value="global">Global</option>
                        <option value="us">United States</option>
                        <option value="eu">Europe</option>
                        <option value="asia">Asia</option>
                        <option value="china">China</option>
                        <option value="india">India</option>
                        <option value="japan">Japan</option>
                        <option value="korea">Korea</option>
                        <option value="oceania">Oceania</option>
                        <option value="south_america">South America</option>
                        <option value="africa">Africa</option>
                        <option value="hong_kong">Hong Kong & Macau</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="virtualBgType">Virtual Background Type</label>
                    <select id="virtualBgType">
                        <option value="img">Image</option>
                        <option value="color">Color</option>
                        <option value="blur">Blur</option>
                        <option value="video">Video</option>
                        <option value="none">None</option>
                    </select>
                </div>
                <div class="input-group" id="virtualBgColorGroup" style="display: none;">
                    <label for="virtualBgColor">Background Color</label>
                    <div class="color-picker-container">
                        <input type="color" id="virtualBgColor" value="#4b2e83">
                        <span id="colorValue">#4b2e83</span>
                    </div>
                </div>
                <div class="input-group" id="virtualBgImgGroup">
                    <label for="virtualBgImgUrl">Image URL</label>
                    <input type="text" id="virtualBgImgUrl" placeholder="Enter image URL" value="https://static6.depositphotos.com/1005348/610/i/450/depositphotos_6100822-stock-photo-yawning-cat.jpg">
                    <small class="small-text">Note: Image must be from a CORS-enabled source</small>
                </div>
                <div class="input-group" id="virtualBgVideoGroup" style="display: none;">
                    <label for="virtualBgVideoUrl">Video URL</label>
                    <input type="text" id="virtualBgVideoUrl" placeholder="Enter video URL" value="https://cdn.pixabay.com/video/2016/05/11/3092-166221773_large.mp4">
                    <small class="small-text">Note: Video must be from a CORS-enabled source</small>
                </div>
                <div class="input-group" id="virtualBgBlurGroup" style="display: none;">
                    <label for="virtualBgBlur">Blur Level</label>
                    <div class="slider-container">
                        <input type="range" id="virtualBgBlur" min="1" max="3" step="1" value="2">
                        <span id="blurValue">Medium</span>
                    </div>
                </div>
                <div class="input-group" id="watermarkSourceGroup">
                    <label for="watermarkSource">Watermark Source</label>
                    <select id="watermarkSource">
                        <option value="url">Image URL</option>
                        <option value="dom">DOM &lt;img&gt; id</option>
                    </select>
                </div>
                <div class="input-group" id="watermarkUrlGroup">
                    <label for="watermarkUrl">Watermark URL</label>
                    <input type="text" id="watermarkUrl" value="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f431.png">
                </div>
                <div class="input-group" id="watermarkDomGroup" style="display:none;">
                    <label for="watermarkImgId">Watermark DOM image id</label>
                    <input type="text" id="watermarkImgId" value="watermarkDomImg">
                </div>
                <div class="input-group" id="watermarkLayoutGroup">
                    <label for="watermarkLayoutMode">Watermark Layout</label>
                    <select id="watermarkLayoutMode">
                        <option value="manual">Manual</option>
                        <option value="top-left">Top Left</option>
                        <option value="top-right">Top Right</option>
                        <option value="bottom-left">Bottom Left</option>
                        <option value="bottom-right" selected>Bottom Right</option>
                    </select>
                </div>
                <div class="input-group" id="watermarkPosGroup">
                    <label>Position / Margin</label>
                    <div class="slider-container">
                        <input type="number" id="watermarkX" value="10" style="max-width:80px;" title="x or margin x">
                        <input type="number" id="watermarkY" value="10" style="max-width:80px;" title="y or margin y">
                    </div>
                </div>
                <div class="input-group" id="watermarkSizeGroup">
                    <label>Size / Opacity</label>
                    <div class="slider-container">
                        <input type="number" id="watermarkW" value="100" placeholder="w" style="max-width:70px;">
                        <input type="number" id="watermarkH" value="50" placeholder="h" style="max-width:70px;">
                        <input type="number" id="watermarkAlpha" value="0.8" min="0" max="1" step="0.05" style="max-width:70px;">
                    </div>
                </div>
                <img id="watermarkDomImg" crossorigin="anonymous" src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f431.png" alt="" width="100" height="50" style="position:absolute;left:-9999px;width:1px;height:1px;overflow:hidden;" aria-hidden="true">
                <div class="input-group" id="svcControls" style="display: none;">
                    <label>SVC Controls</label>
                    <div class="svc-options">
                        <div class="svc-option">
                            <label for="spatialLayer">Spatial</label>
                            <div class="slider-container">
                                <input type="range" id="spatialLayer" min="0" max="3" step="1" value="3">
                                <span id="spatialValue">3</span>
                            </div>
                        </div>
                        <div class="svc-option">
                            <label for="temporalLayer">Temporal</label>
                            <div class="slider-container">
                                <input type="range" id="temporalLayer" min="0" max="3" step="1" value="3">
                                <span id="temporalValue">3</span>
                            </div>
                        </div>
                        <button id="applySVCBtn">Apply SVC Settings</button>
                    </div>
                </div>
            </div>

            <div class="button-group">
                <button id="joinBtn" class="primary">Join Channel</button>
                <button id="leaveBtn" class="danger" disabled>Leave Channel</button>
                <button id="muteMicBtn">Mute Mic</button>
                <button id="muteCameraBtn">Mute Camera</button>
                <button id="dualStreamBtn">Enable Dual Stream</button>
                <button id="switchStreamBtn">Set to Low Quality</button>
                <button id="virtualBgBtn">Toggle Virtual Background</button>
                <button id="ainsBtn">Toggle AINS</button>
                <button id="beautyBtn">Toggle Beauty</button>
                <button id="watermarkBtn">Enable Watermark</button>
            </div>

            <div id="beautyControls" class="beauty-controls" style="display: none;">
                <div class="input-group">
                    <label for="contrastLevel">Contrast Level</label>
                    <div class="slider-container">
                        <input type="range" id="contrastLevel" min="0" max="2" value="1">
                        <span id="contrastValue">1</span>
                    </div>
                </div>
                <div class="input-group">
                    <label for="smoothnessLevel">Smoothness Level</label>
                    <div class="slider-container">
                        <input type="range" id="smoothnessLevel" min="0" max="100" value="50">
                        <span id="smoothnessValue">0.5</span>
                    </div>
                </div>
                <div class="input-group">
                    <label for="whiteLevel">White Level</label>
                    <div class="slider-container">
                        <input type="range" id="whiteLevel" min="0" max="100" value="60">
                        <span id="whiteValue">0.6</span>
                    </div>
                </div>
                <div class="input-group">
                    <label for="rednessLevel">Redness Level</label>
                    <div class="slider-container">
                        <input type="range" id="rednessLevel" min="0" max="100" value="10">
                        <span id="rednessValue">0.1</span>
                    </div>
                </div>
                <div class="input-group">
                    <label for="sharpnessLevel">Sharpness Level</label>
                    <div class="slider-container">
                        <input type="range" id="sharpnessLevel" min="0" max="100" value="30">
                        <span id="sharpnessValue">0.3</span>
                    </div>
                </div>
            </div>

            <div class="stats-overview">
                <div id="overallStats" class="stats"></div>
                <div class="graphs-container">
                    <div id="networkQualityChart"></div>
                    <div id="fpsChart"></div>
                    <div id="virtualBgCostChart"></div>
                    <div id="resolutionChart"></div>
                </div>
            </div>

            <div class="video-container">
                <div class="video-wrapper">
                    <div class="video-box">
                        <div id="localVideo"></div>
                        <div id="localVideoStats" class="video-overlay-stats"></div>
                    </div>
                </div>
                <div class="video-wrapper">
                    <div class="video-box">
                        <div id="remoteVideo"></div>
                        <div id="remoteVideoStats" class="video-overlay-stats"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="svc-popup-overlay"></div>
    <div class="svc-popup">
        <h3>SVC Settings</h3>
        <div class="svc-popup-content ">
            <div class="input-group svc-checkbox-wrapper">
                <label for="enableSVC">
                    <input type="checkbox" id="enableSVC" >Enable SVC (VP9 Scalable Video Coding)
                </label>
                <div class="checkbox-label-text">
                    <small>Enable before joining call or it won't work!</small>
                </div>
            </div>
            <div id="svcControls" style="display: none;">
                <div class="svc-option">
                    <label for="spatialLayer">Spatial Layer (0-3)</label>
                    <input type="number" id="spatialLayer" min="0" max="3" value="3">
                </div>
                <div class="svc-option">
                    <label for="temporalLayer">Temporal Layer (0-3)</label>
                    <input type="number" id="temporalLayer" min="0" max="3" value="3">
                </div>
            </div>
        </div>
        <div class="svc-popup-footer">
            <button class="cancel">Cancel</button>
            <button class="save">Save Changes</button>
        </div>
    </div>

    <script src="app.js"></script>
    <script src="beauty.js"></script>
    <script src="watermark.js"></script>
    <script>
        window.addEventListener('load', function () {
            if (!window.toggleWatermark) {
                window.toggleWatermark = async function () {
                    if (window.showPopup) window.showPopup('Watermark script failed to load (see console).');
                };
            }
        });
        document.addEventListener('DOMContentLoaded', () => {
            if (window.initBeautyControls) window.initBeautyControls();
        });
    </script>
</body>
</html>
